<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toronto Tennis Courts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --green:   #2d6a4f;
      --green2:  #40916c;
      --lime:    #b7e4c7;
      --clay:    #e07a5f;
      --cream:   #f8f4ec;
      --dark:    #1a1a1a;
      --mid:     #3d3d3d;
      --light:   #e8e2d9;
      --white:   #ffffff;
      --panel:   rgba(248,244,236,0.97);
      --shadow:  0 4px 24px rgba(0,0,0,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--dark);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
      border-bottom: 2px solid var(--green2);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      color: var(--white);
      line-height: 1;
    }

    .logo span { color: #52b788; }

    .btn-satellite {
      padding: 6px 14px;
      border: 1.5px solid var(--green2);
      border-radius: 20px;
      background: transparent;
      color: var(--lime);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-satellite:hover,
    .btn-satellite.active {
      background: var(--green2);
      color: var(--white);
    }
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--lime);
      letter-spacing: 0.08em;
      opacity: 0.85;
    }

    /* ── MAIN LAYOUT ── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 340px;
      min-width: 340px;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
      box-shadow: 4px 0 20px rgba(0,0,0,0.18);
      transition: transform 0.3s ease;
    }

    /* ── SEARCH BAR ── */
    .search-section {
      padding: 14px 16px 10px;
      background: var(--green);
      flex-shrink: 0;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    .search-input {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      background: var(--white);
      color: var(--dark);
      outline: none;
    }

    .search-input::placeholder { color: #aaa; }

    .btn-locate, .btn-search {
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-search {
      background: var(--clay);
      color: var(--white);
    }

    .btn-search:hover { background: #c9614a; }

    .btn-locate {
      background: var(--lime);
      color: var(--green);
      font-size: 1rem;
      padding: 9px 12px;
    }

    .btn-locate:hover { background: #95d5b2; }

    /* ── FILTERS ── */
    .filter-section {
      padding: 12px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--light);
      flex-shrink: 0;
    }

    .filter-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green2);
      margin-bottom: 10px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .filter-group label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 4px;
    }

    .filter-group select {
      width: 100%;
      padding: 6px 10px;
      border: 1.5px solid var(--light);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      background: var(--cream);
      color: var(--dark);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-group select:focus { border-color: var(--green2); }

    .filter-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    .btn-reset {
      font-size: 0.75rem;
      padding: 5px 12px;
      border: 1.5px solid var(--light);
      border-radius: 6px;
      background: transparent;
      color: var(--mid);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-reset:hover { border-color: var(--clay); color: var(--clay); }

    /* ── RESULTS LIST ── */
    .results-header {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: var(--cream);
    }

    .results-count {
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      color: var(--green2);
      letter-spacing: 0.06em;
    }

    #court-list {
      overflow-y: auto;
      flex: 1;
      padding: 4px 0 12px;
    }

    #court-list::-webkit-scrollbar { width: 4px; }
    #court-list::-webkit-scrollbar-track { background: transparent; }
    #court-list::-webkit-scrollbar-thumb { background: var(--light); border-radius: 4px; }

    .court-card {
      padding: 12px 16px;
      border-bottom: 1px solid var(--light);
      cursor: pointer;
      transition: background 0.15s;
      animation: fadeIn 0.25s ease both;
    }

    .court-card:hover { background: var(--white); }
    .court-card.active { background: var(--white); border-left: 3px solid var(--clay); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--dark);
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .card-address {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 7px;
      line-height: 1.4;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .tag-surface  { background: #d8f3dc; color: #1b4332; }
    .tag-lights   { background: #fff3cd; color: #856404; }
    .tag-nolights { background: #f1f1f1; color: #666; }
    .tag-pickle   { background: #cfe2ff; color: #084298; }
    .tag-indoor   { background: #e2d9f3; color: #432874; }
    .tag-public   { background: #d1ecf1; color: #0c5460; }
    .tag-private  { background: #f8d7da; color: #721c24; }
    .tag-courts   { background: #f0f0f0; color: #333; }

    .no-results {
      padding: 40px 20px;
      text-align: center;
      color: #aaa;
      font-size: 0.85rem;
    }

    .no-results .emoji { font-size: 2rem; display: block; margin-bottom: 8px; }

    /* ── MAP ── */
    #map {
      flex: 1;
      height: 100%;
      background: #e8e0d5;
    }

    /* ── INFO WINDOW CUSTOM ── */
    .iw-wrap {
      font-family: 'DM Sans', sans-serif;
      max-width: 260px;
      padding: 2px;
    }

    .iw-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--dark);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .iw-address {
      font-size: 0.78rem;
      color: #777;
      margin-bottom: 10px;
    }

    .iw-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 12px;
    }

    .iw-actions {
      display: flex;
      gap: 8px;
    }

    .iw-btn {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 7px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }

    .iw-btn:hover { opacity: 0.85; }
    .iw-btn-dir  { background: var(--green); color: white; }
    .iw-btn-share { background: var(--light); color: var(--dark); }

    /* ── MOBILE TOGGLE ── */
    #sidebar-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      letter-spacing: 0.05em;
      gap: 6px;
      align-items: center;
    }

    /* ── LOADING ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 999;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: white;
      letter-spacing: 0.06em;
    }

    .loading-logo span { color: var(--clay); }

    .loading-bar {
      width: 200px;
      height: 3px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      background: var(--green2);
      border-radius: 3px;
      animation: loadBar 1.5s ease forwards;
    }

    @keyframes loadBar {
      from { width: 0; }
      to   { width: 100%; }
    }

    .loading-sub {
      font-size: 0.78rem;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 720px) {
      #sidebar {
        position: fixed;
        inset: 56px 0 0 0;
        width: 100%;
        min-width: unset;
        transform: translateY(100%);
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -8px 30px rgba(0,0,0,0.25);
      }

      #sidebar.open {
        transform: translateY(0);
      }

      #sidebar-toggle {
        display: flex;
      }

      #map {
        position: absolute;
        inset: 0;
      }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-overlay">
  <div class="loading-logo">Toronto<span>Tennis</span></div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div class="loading-sub">Loading courts…</div>
</div>

<!-- Header -->
<header>
  <div class="logo">Toronto<span>Tennis</span> Courts</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn-satellite" id="btn-satellite" onclick="toggleSatellite()">🛰 Satellite</button>
    <div class="court-count" id="header-count">— courts</div>
  </div>
</header>

<div class="app-body">

  <!-- Sidebar -->
  <div id="sidebar">

    <!-- Search -->
    <div class="search-section">
      <div class="search-row">
        <input id="search-input" class="search-input" type="text" placeholder="Search by address or neighbourhood…" />
        <button class="btn-search" onclick="searchAddress()">Go</button>
        <button class="btn-locate" onclick="locateMe()" title="Use my location">📍</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-section">
      <div class="filter-title">🎾 Filter Courts</div>
      <div class="filter-grid">

        <div class="filter-group">
          <label>Surface</label>
          <select id="f-surface" onchange="applyFilters()">
            <option value="">All Surfaces</option>
            <option>Hard</option>
            <option>Clay</option>
            <option>Grass</option>
            <option>Carpet</option>
            <option>Synthetic</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Courts</label>
          <select id="f-courts" onchange="applyFilters()">
            <option value="">Any Number</option>
            <option value="1">1 Court</option>
            <option value="2">2 Courts</option>
            <option value="3">3 Courts</option>
            <option value="4">4+ Courts</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Lights</label>
          <select id="f-lights" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="Lights">Lights ✅</option>
            <option value="No Lights">No Lights</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Pickleball</label>
          <select id="f-pickle" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="Yes">Has Lines ✅</option>
            <option value="No">No Lines</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Indoor/Outdoor</label>
          <select id="f-indoor" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="Outdoor">Outdoor</option>
            <option value="Indoor">Indoor</option>
          </select>
        </div>

        <div class="filter-group">
          <label>Access</label>
          <select id="f-access" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="Public">Public</option>
            <option value="Private">Private</option>
          </select>
        </div>

      </div>
      <div class="filter-actions">
        <button class="btn-reset" onclick="resetFilters()">Reset All Filters</button>
      </div>
    </div>

    <!-- Results -->
    <div class="results-header">
      <div class="results-count" id="results-count">Loading…</div>
    </div>

    <div id="court-list"></div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<!-- Mobile Toggle -->
<button id="sidebar-toggle" onclick="toggleSidebar()">
  <span id="toggle-icon">🎾</span>&nbsp; <span id="toggle-label">Show Courts List</span>
</button>

<script>
  // ── CONFIG ──────────────────────────────────────────────────
  const GOOGLE_MAPS_KEY = 'AIzaSyAP8Tvz2AP6jdfRSU0l251-O7J013k6QlI';

  // !! REPLACE THIS with your Google Sheet published CSV URL !!
  // Instructions: In Google Sheets → File → Share → Publish to web
  //               Choose "Entire Document" and "CSV" → click Publish → copy URL
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTm-gXqDDRT7juHkXVn0_xJmb5QL-Z2oOawVAVxObTeh8lwIMMO1ObU7D-ewVQnxW9e_A7FZXRo1MVf/pub?output=csv';

  // ── STATE ───────────────────────────────────────────────────
  let map, markers = [], allCourts = [], filteredCourts = [];
  let activeCard = null, activeInfoWindow = null;
  let sidebarOpen = false;

  // ── LOAD GOOGLE MAPS ────────────────────────────────────────
  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 43.7, lng: -79.42 },
      zoom: 12,
      styles: mapStyle,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false,
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_CENTER }
    });
    loadCourts();
  }

  // ── LOAD COURTS FROM GOOGLE SHEET ───────────────────────────
  async function loadCourts() {
    try {
      const res  = await fetch(SHEET_CSV_URL);
      const text = await res.text();
      allCourts  = parseCSV(text);
      populateSurfaceFilter();
      filteredCourts = allCourts;
      renderAll();
      document.getElementById('header-count').textContent = allCourts.length + ' courts';
    } catch(e) {
      showDemoData();
    }
    hideLoading();
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,''));
    return lines.slice(1).map(line => {
      const cols = smartSplit(line);
      const obj = {};
      headers.forEach((h, i) => obj[h] = (cols[i] || '').trim().replace(/"/g,''));
      return obj;
    }).filter(r => r.Latitude && r.Longitude);
  }

  function smartSplit(line) {
    const result = []; let cur = ''; let inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
      else cur += c;
    }
    result.push(cur);
    return result;
  }

  function populateSurfaceFilter() {
    const surfaces = [...new Set(allCourts.map(c => c['Surface']).filter(Boolean))].sort();
    const sel = document.getElementById('f-surface');
    sel.innerHTML = '<option value="">All Surfaces</option>';
    surfaces.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
  }

  // ── RENDER ──────────────────────────────────────────────────
  function renderAll() {
    clearMarkers();
    renderList();
    filteredCourts.forEach(court => addMarker(court));
    document.getElementById('results-count').textContent =
      filteredCourts.length + ' of ' + allCourts.length + ' courts shown';
  }

  function clearMarkers() {
    markers.forEach(m => m.setMap(null));
    markers = [];
    if (activeInfoWindow) { activeInfoWindow.close(); activeInfoWindow = null; }
  }

  function renderList() {
    const list = document.getElementById('court-list');
    if (!filteredCourts.length) {
      list.innerHTML = '<div class="no-results"><span class="emoji">🎾</span>No courts match your filters.</div>';
      return;
    }
    list.innerHTML = filteredCourts.map((c, i) => `
      <div class="court-card" id="card-${i}" onclick="focusCourt(${i})">
        <div class="card-name">${c['Name'] || 'Unknown Court'}</div>
        <div class="card-address">${c['Address'] || ''}</div>
        <div class="card-tags">${buildTags(c)}</div>
      </div>
    `).join('');
  }

  function buildTags(c) {
    let t = '';
    if (c['Surface'])            t += `<span class="tag tag-surface">${c['Surface']}</span>`;
    if (c['Number of Courts'])   t += `<span class="tag tag-courts">${c['Number of Courts']} ct</span>`;
    const lights = c['Lights/No Lights'] || '';
    if (lights.toLowerCase().includes('no')) t += `<span class="tag tag-nolights">No Lights</span>`;
    else if (lights)             t += `<span class="tag tag-lights">💡 Lights</span>`;
    const pickle = c['Pickleball Lines'] || '';
    if (pickle.toLowerCase() === 'yes') t += `<span class="tag tag-pickle">🏓 Pickleball</span>`;
    const io = c['Indoor/Outdoor'] || '';
    if (io.toLowerCase() === 'indoor') t += `<span class="tag tag-indoor">Indoor</span>`;
    const access = c['Public/Private'] || '';
    if (access.toLowerCase() === 'private') t += `<span class="tag tag-private">Private</span>`;
    else if (access)             t += `<span class="tag tag-public">Public</span>`;
    return t;
  }

  // ── MARKERS ─────────────────────────────────────────────────
  function addMarker(court) {
    const lat = parseFloat(court['Latitude']);
    const lng = parseFloat(court['Longitude']);
    if (isNaN(lat) || isNaN(lng)) return;

    const idx = filteredCourts.indexOf(court);
    const isPrivate = (court['Public/Private'] || '').toLowerCase() === 'private';

    const marker = new google.maps.Marker({
      position: { lat, lng },
      map,
      title: court['Name'],
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: isPrivate ? '#95d5b2' : '#2d6a4f',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
        scale: 9
      }
    });

    marker.addListener('click', () => focusCourt(idx));
    markers.push(marker);
    court._marker = marker;
  }

  function focusCourt(idx) {
    const court = filteredCourts[idx];
    if (!court || !court._marker) return;

    // highlight card
    if (activeCard) activeCard.classList.remove('active');
    const card = document.getElementById('card-' + idx);
    if (card) {
      card.classList.add('active');
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      activeCard = card;
    }

    // info window
    if (activeInfoWindow) activeInfoWindow.close();
    const iw = new google.maps.InfoWindow({
      content: buildInfoWindow(court),
      maxWidth: 280
    });
    iw.open(map, court._marker);
    activeInfoWindow = iw;

    map.panTo(court._marker.getPosition());
    if (map.getZoom() < 15) map.setZoom(15);

    // mobile: close sidebar
    if (window.innerWidth <= 720) closeSidebar();
  }

  function buildInfoWindow(c) {
    const addr  = encodeURIComponent((c['Name'] || '') + ' ' + (c['Address'] || ''));
    const share = `https://www.google.com/maps/search/?api=1&query=${addr}`;
    const dir   = `https://www.google.com/maps/dir/?api=1&destination=${addr}`;
    return `
      <div class="iw-wrap">
        <div class="iw-name">${c['Name'] || 'Tennis Court'}</div>
        <div class="iw-address">${c['Address'] || ''}</div>
        <div class="iw-tags">${buildTags(c)}</div>
        <div class="iw-actions">
          <a class="iw-btn iw-btn-dir" href="${dir}" target="_blank">🗺 Directions</a>
          <a class="iw-btn iw-btn-share" href="${share}" target="_blank">Share</a>
        </div>
      </div>
    `;
  }

  // ── FILTERS ─────────────────────────────────────────────────
  function applyFilters() {
    const surface = document.getElementById('f-surface').value.toLowerCase();
    const courts  = document.getElementById('f-courts').value;
    const lights  = document.getElementById('f-lights').value.toLowerCase();
    const pickle  = document.getElementById('f-pickle').value.toLowerCase();
    const indoor  = document.getElementById('f-indoor').value.toLowerCase();
    const access  = document.getElementById('f-access').value.toLowerCase();

    filteredCourts = allCourts.filter(c => {
      if (surface && (c['Surface'] || '').toLowerCase() !== surface) return false;
      if (courts) {
        const n = parseInt(c['Number of Courts']);
        if (courts === '4') { if (n < 4) return false; }
        else { if (n !== parseInt(courts)) return false; }
      }
      if (lights  && (c['Lights/No Lights'] || '').toLowerCase() !== lights)  return false;
      if (pickle  && (c['Pickleball Lines'] || '').toLowerCase() !== pickle)   return false;
      if (indoor) {
        const val = (c['Indoor/Outdoor'] || '').toLowerCase();
        if (indoor === 'indoor') {
          // Show courts that are Indoor-only OR Outdoor/Indoor (domed)
          if (!val.includes('indoor')) return false;
        } else if (indoor === 'outdoor') {
          // Show courts that are Outdoor-only (not domed)
          if (val !== 'outdoor') return false;
        }
      }
      if (access  && (c['Public/Private']   || '').toLowerCase() !== access)   return false;
      return true;
    });

    renderAll();
  }

  function resetFilters() {
    ['f-surface','f-courts','f-lights','f-pickle','f-indoor','f-access']
      .forEach(id => document.getElementById(id).value = '');
    filteredCourts = allCourts;
    renderAll();
  }

  // ── SATELLITE TOGGLE ────────────────────────────────────────
  let satelliteOn = false;
  function toggleSatellite() {
    satelliteOn = !satelliteOn;
    map.setMapTypeId(satelliteOn ? 'hybrid' : 'roadmap');
    if (!satelliteOn) map.setOptions({ styles: mapStyle });
    else map.setOptions({ styles: [] });
    const btn = document.getElementById('btn-satellite');
    btn.classList.toggle('active', satelliteOn);
    btn.textContent = satelliteOn ? '🗺 Street View' : '🛰 Satellite';
  }

  // ── SEARCH ADDRESS ──────────────────────────────────────────
  function searchAddress() {
    const val = document.getElementById('search-input').value.trim();
    if (!val) return;
    const geo = new google.maps.Geocoder();
    geo.geocode({ address: val + ', Toronto, Ontario' }, (res, status) => {
      if (status === 'OK') {
        map.setCenter(res[0].geometry.location);
        map.setZoom(14);
        if (window.innerWidth <= 720) closeSidebar();
      } else {
        alert('Address not found. Try a neighbourhood name or street.');
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchAddress();
    });
  });

  // ── LOCATE ME ───────────────────────────────────────────────
  function locateMe() {
    if (!navigator.geolocation) { alert('Geolocation not supported by your browser.'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setCenter(loc);
      map.setZoom(14);
      new google.maps.Marker({
        position: loc, map,
        title: 'You are here',
        icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: '#e07a5f', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 7 }
      });
      if (window.innerWidth <= 720) closeSidebar();
    }, () => alert('Could not get your location.'));
  }

  // ── MOBILE SIDEBAR ──────────────────────────────────────────
  function toggleSidebar() {
    sidebarOpen ? closeSidebar() : openSidebar();
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('toggle-label').textContent = 'Back to Map';
    document.getElementById('toggle-icon').textContent = '🗺';
    sidebarOpen = true;
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('toggle-label').textContent = 'Show Courts List';
    document.getElementById('toggle-icon').textContent = '🎾';
    sidebarOpen = false;
  }

  // ── LOADING ─────────────────────────────────────────────────
  function hideLoading() {
    setTimeout(() => {
      document.getElementById('loading-overlay').classList.add('hidden');
    }, 800);
  }

  // ── DEMO DATA (shown if Sheet not yet connected) ─────────────
  function showDemoData() {
    allCourts = [
      { Name: 'Greenwood Park Tennis', Address: '150 Greenwood Ave, Toronto', Latitude: '43.665', Longitude: '-79.332', Surface: 'Hard', 'Number of Courts': '4', 'Lights/No Lights': 'Lights', 'Pickleball Lines': 'Yes', 'Indoor/Outdoor': 'Outdoor', 'Public/Private': 'Public' },
      { Name: 'High Park Tennis Courts', Address: '1873 Bloor St W, Toronto', Latitude: '43.646', Longitude: '-79.463', Surface: 'Clay', 'Number of Courts': '8', 'Lights/No Lights': 'No Lights', 'Pickleball Lines': 'No', 'Indoor/Outdoor': 'Outdoor', 'Public/Private': 'Public' },
      { Name: 'Ramsden Park', Address: '1020 Yonge St, Toronto', Latitude: '43.679', Longitude: '-79.393', Surface: 'Hard', 'Number of Courts': '3', 'Lights/No Lights': 'Lights', 'Pickleball Lines': 'Yes', 'Indoor/Outdoor': 'Outdoor', 'Public/Private': 'Public' },
      { Name: 'Eglinton Park', Address: '200 Eglinton Ave W, Toronto', Latitude: '43.705', Longitude: '-79.406', Surface: 'Hard', 'Number of Courts': '2', 'Lights/No Lights': 'No Lights', 'Pickleball Lines': 'No', 'Indoor/Outdoor': 'Outdoor', 'Public/Private': 'Public' },
      { Name: 'Scarborough Tennis Club', Address: '1 Avoca Ave, Scarborough', Latitude: '43.743', Longitude: '-79.258', Surface: 'Synthetic', 'Number of Courts': '6', 'Lights/No Lights': 'Lights', 'Pickleball Lines': 'No', 'Indoor/Outdoor': 'Indoor', 'Public/Private': 'Private' },
      { Name: 'Christie Pits Park', Address: '750 Bloor St W, Toronto', Latitude: '43.663', Longitude: '-79.419', Surface: 'Hard', 'Number of Courts': '4', 'Lights/No Lights': 'Lights', 'Pickleball Lines': 'Yes', 'Indoor/Outdoor': 'Outdoor', 'Public/Private': 'Public' },
    ];
    allCourts.forEach(c => c._marker = null);
    populateSurfaceFilter();
    filteredCourts = allCourts;
    document.getElementById('header-count').textContent = allCourts.length + ' courts (demo)';
    renderAll();
  }

  // ── MAP STYLE ────────────────────────────────────────────────
  const mapStyle = [
    { elementType: 'geometry', stylers: [{ color: '#f0ebe3' }] },
    { elementType: 'labels.text.fill', stylers: [{ color: '#5c5c5c' }] },
    { elementType: 'labels.text.stroke', stylers: [{ color: '#f0ebe3' }] },
    { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
    { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#e0d8c8' }] },
    { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#b8d4e8' }] },
    { featureType: 'park', elementType: 'geometry', stylers: [{ color: '#c8e6c9' }] },
    { featureType: 'transit', stylers: [{ visibility: 'off' }] },
    { featureType: 'poi', stylers: [{ visibility: 'off' }] },
  ];
</script>
